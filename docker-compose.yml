services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - collectai-net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/collectai
      - CLIENT_URL=http://localhost:81
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - collectai-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "81:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - collectai-net

volumes:
  mongo_data:

networks:
  collectai-net:
    driver: bridge
